<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@500;600&display=swap" rel="stylesheet">
<style>
 body{margin:0;font-family:Inter,sans-serif;background:#eef2f7}
 .row{display:flex;flex-wrap:wrap}
 .cell{padding:44px 50px;display:flex;flex-direction:column;align-items:center;gap:16px}
 .light{background:#F4F7FB}.dark{background:#0A1F33}.sky{background:#cfe6f2}
 .label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#8aa0b6;font-weight:700}
 .dark .label{color:#5b7791}
 .wm{font-family:'Sora';font-weight:800;font-size:44px;letter-spacing:-1px;line-height:1}
 .wm .p{color:#0C2747}.wm .v{color:#1FA85C}
 .dark .wm .p{color:#fff}
 .tag{font-family:'Sora';font-weight:600;font-size:12px;letter-spacing:6px;color:#5B7185;margin-top:6px}
 .dark .tag{color:#8aa6c2}
 .lockup{display:flex;align-items:center;gap:18px}
</style></head><body>

<div class="row">
 <!-- A: faithful open emblem -->
 <div class="cell light"><div class="label">A · Open · light</div>
  <svg width="118" height="118" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
   <defs>
    <linearGradient id="aArc" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#E0382F"/><stop offset="1" stop-color="#F58233"/></linearGradient>
    <linearGradient id="aBolt" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFD23F"/><stop offset="1" stop-color="#F5A100"/></linearGradient>
   </defs>
   <!-- sunrise arc -->
   <path d="M18 100 A42 42 0 0 1 102 100 Z" fill="url(#aArc)"/>
   <g stroke="#E0382F" stroke-width="2.4" stroke-linecap="round" opacity=".8"><line x1="60" y1="40" x2="60" y2="30"/><line x1="34" y1="52" x2="27" y2="46"/><line x1="86" y1="52" x2="93" y2="46"/></g>
   <!-- horizon -->
   <line x1="12" y1="100" x2="108" y2="100" stroke="#0C2747" stroke-width="2.6" stroke-linecap="round"/>
   <!-- tower -->
   <g stroke="#16335A" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M40 100 L55 38"/><path d="M80 100 L65 38"/>
    <path d="M55 38 L60 24 L65 38"/><path d="M60 38 L60 24"/>
    <path d="M31 70 H89"/><path d="M37 56 H83"/><path d="M43 44 H77"/>
    <path d="M45 96 L74 80 M75 96 L46 80 M48 78 L72 66 M73 78 L49 66 M51 64 L69 54 M70 64 L52 54"/>
   </g>
   <g stroke="#16335A" stroke-width="2" stroke-linecap="round"><line x1="31" y1="70" x2="31" y2="76"/><line x1="89" y1="70" x2="89" y2="76"/><line x1="37" y1="56" x2="37" y2="61"/><line x1="83" y1="56" x2="83" y2="61"/></g>
   <!-- bolt -->
   <path d="M67 30 L49 66 H60 L54 98 L77 58 H64 L73 30 Z" fill="url(#aBolt)" stroke="#fff" stroke-width="1.4" stroke-linejoin="round"/>
  </svg>
 </div>

 <div class="cell sky"><div class="label">A · on sky (their bg)</div>
  <div class="lockup">
   <svg width="92" height="92" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
     <linearGradient id="a2Arc" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#E0382F"/><stop offset="1" stop-color="#F58233"/></linearGradient>
     <linearGradient id="a2Bolt" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFD23F"/><stop offset="1" stop-color="#F5A100"/></linearGradient>
    </defs>
    <path d="M18 100 A42 42 0 0 1 102 100 Z" fill="url(#a2Arc)"/>
    <line x1="12" y1="100" x2="108" y2="100" stroke="#0C2747" stroke-width="2.6" stroke-linecap="round"/>
    <g stroke="#16335A" stroke-width="2.5" stroke-linecap="round" fill="none">
     <path d="M40 100 L55 38"/><path d="M80 100 L65 38"/><path d="M55 38 L60 24 L65 38"/><path d="M60 38 L60 24"/>
     <path d="M31 70 H89"/><path d="M37 56 H83"/><path d="M43 44 H77"/>
     <path d="M45 96 L74 80 M75 96 L46 80 M48 78 L72 66 M73 78 L49 66 M51 64 L69 54 M70 64 L52 54"/></g>
    <path d="M67 30 L49 66 H60 L54 98 L77 58 H64 L73 30 Z" fill="url(#a2Bolt)" stroke="#fff" stroke-width="1.4" stroke-linejoin="round"/>
   </svg>
   <div><div class="wm"><span class="p">Prime</span><span class="v">Volt</span></div><div class="tag">ENERGY&nbsp;SYSTEMS</div></div>
  </div>
 </div>

 <!-- B: premium navy tile -->
 <div class="cell light"><div class="label">B · Tile</div>
  <svg width="118" height="118" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
   <defs>
    <linearGradient id="bN" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#15406B"/><stop offset=".55" stop-color="#0D2C4D"/><stop offset="1" stop-color="#081B30"/></linearGradient>
    <linearGradient id="bArc" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#E0382F"/><stop offset="1" stop-color="#F58233"/></linearGradient>
    <linearGradient id="bBolt" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFD23F"/><stop offset="1" stop-color="#F5A100"/></linearGradient>
   </defs>
   <rect x="6" y="6" width="108" height="108" rx="28" fill="url(#bN)"/>
   <clipPath id="bClip"><rect x="6" y="6" width="108" height="108" rx="28"/></clipPath>
   <g clip-path="url(#bClip)">
    <path d="M22 102 A38 38 0 0 1 98 102 Z" fill="url(#bArc)" opacity=".95"/>
    <line x1="14" y1="102" x2="106" y2="102" stroke="#79A6D6" stroke-width="2" stroke-linecap="round" opacity=".6"/>
    <g stroke="#BFE0FF" stroke-width="2.4" stroke-linecap="round" fill="none" opacity=".92">
     <path d="M42 102 L56 44"/><path d="M78 102 L64 44"/><path d="M56 44 L60 31 L64 44"/>
     <path d="M34 72 H86"/><path d="M40 59 H80"/><path d="M46 48 H74"/>
     <path d="M47 98 L73 83 M74 98 L48 83 M50 81 L70 69 M71 81 L51 69"/></g>
    <path d="M67 33 L50 67 H60 L55 97 L77 60 H64 L72 33 Z" fill="url(#bBolt)"/>
   </g>
  </svg>
 </div>

 <div class="cell dark"><div class="label">B · lockup (dark)</div>
  <div class="lockup">
   <svg width="92" height="92" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
     <linearGradient id="b2N" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1A4C7C"/><stop offset=".55" stop-color="#0D2C4D"/><stop offset="1" stop-color="#081B30"/></linearGradient>
     <linearGradient id="b2Arc" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#E0382F"/><stop offset="1" stop-color="#F58233"/></linearGradient>
     <linearGradient id="b2Bolt" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFD23F"/><stop offset="1" stop-color="#F5A100"/></linearGradient>
    </defs>
    <rect x="6" y="6" width="108" height="108" rx="28" fill="url(#b2N)" stroke="#2E5C8A" stroke-opacity=".5"/>
    <clipPath id="b2Clip"><rect x="6" y="6" width="108" height="108" rx="28"/></clipPath>
    <g clip-path="url(#b2Clip)">
     <path d="M22 102 A38 38 0 0 1 98 102 Z" fill="url(#b2Arc)" opacity=".95"/>
     <g stroke="#BFE0FF" stroke-width="2.4" stroke-linecap="round" fill="none" opacity=".92">
      <path d="M42 102 L56 44"/><path d="M78 102 L64 44"/><path d="M56 44 L60 31 L64 44"/>
      <path d="M34 72 H86"/><path d="M40 59 H80"/><path d="M46 48 H74"/>
      <path d="M47 98 L73 83 M74 98 L48 83 M50 81 L70 69 M71 81 L51 69"/></g>
     <path d="M67 33 L50 67 H60 L55 97 L77 60 H64 L72 33 Z" fill="url(#b2Bolt)"/></g>
   </svg>
   <div><div class="wm"><span class="p">Prime</span><span class="v">Volt</span></div><div class="tag">ENERGY&nbsp;SYSTEMS</div></div>
  </div>
 </div>
</div>

<div class="row">
 <div class="cell light" style="width:100%;align-items:flex-start">
  <div class="label">A · Primary horizontal lockup</div>
  <div class="lockup">
   <svg width="104" height="104" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
     <linearGradient id="hArc" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#E0382F"/><stop offset="1" stop-color="#F58233"/></linearGradient>
     <linearGradient id="hBolt" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFD23F"/><stop offset="1" stop-color="#F5A100"/></linearGradient>
    </defs>
    <path d="M18 100 A42 42 0 0 1 102 100 Z" fill="url(#hArc)"/>
    <line x1="12" y1="100" x2="108" y2="100" stroke="#0C2747" stroke-width="2.6" stroke-linecap="round"/>
    <g stroke="#16335A" stroke-width="2.5" stroke-linecap="round" fill="none">
     <path d="M40 100 L55 38"/><path d="M80 100 L65 38"/><path d="M55 38 L60 24 L65 38"/><path d="M60 38 L60 24"/>
     <path d="M31 70 H89"/><path d="M37 56 H83"/><path d="M43 44 H77"/>
     <path d="M45 96 L74 80 M75 96 L46 80 M48 78 L72 66 M73 78 L49 66 M51 64 L69 54 M70 64 L52 54"/></g>
    <path d="M67 30 L49 66 H60 L54 98 L77 58 H64 L73 30 Z" fill="url(#hBolt)" stroke="#fff" stroke-width="1.4" stroke-linejoin="round"/>
   </svg>
   <div><div class="wm" style="font-size:52px"><span class="p">Prime</span><span class="v">Volt</span></div><div class="tag" style="font-size:13.5px">ENERGY&nbsp;&nbsp;SYSTEMS</div></div>
  </div>
 </div>
</div>

</body></html>
