<!doctype html>
<html><head><meta charset="utf-8"><style>
 body{margin:0;font-family:Arial,sans-serif}
 .grid{display:grid;grid-template-columns:1fr 1fr}
 .p{padding:40px;display:flex;flex-direction:column;gap:26px;align-items:flex-start}
 .light{background:#F4F7FB}.dark{background:#0A1F33}.mist{background:#E7EDF4}
 .cap{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#90a0b2}
 img{display:block}
 .check{background:
   linear-gradient(45deg,#d4dae2 25%,transparent 25%),
   linear-gradient(-45deg,#d4dae2 25%,transparent 25%),
   linear-gradient(45deg,transparent 75%,#d4dae2 75%),
   linear-gradient(-45deg,transparent 75%,#d4dae2 75%);
   background-size:20px 20px;background-position:0 0,0 10px,10px -10px,-10px 0;background-color:#eef2f6}
</style></head><body>
<div class="grid">
  <div class="p light">
    <div class="cap">Horizontal · light</div>
    <img src="../brand/primevolt-logo-horizontal.png" width="420">
    <div class="cap">Stacked · light</div>
    <img src="../brand/primevolt-logo-stacked.png" width="240">
    <div class="cap">Mono navy</div>
    <img src="../brand/primevolt-logo-mono.png" width="380">
  </div>
  <div class="p dark">
    <div class="cap" style="color:#5b7791">White / reversed · navy</div>
    <img src="../brand/primevolt-logo-white.png" width="420">
    <div class="cap" style="color:#5b7791">Mark · navy</div>
    <img src="../brand/primevolt-mark.png" width="120">
    <img src="../brand/primevolt-mark-mono.png" width="120">
  </div>
</div>
<div class="grid">
  <div class="p check">
    <div class="cap">Mark · transparency check</div>
    <img src="../brand/primevolt-mark.png" width="150">
    <img src="../brand/primevolt-logo-horizontal.png" width="430">
  </div>
  <div class="p mist">
    <div class="cap">Small-size legibility</div>
    <img src="../brand/primevolt-logo-horizontal.png" width="220">
    <img src="../brand/primevolt-mark.png" width="44">
    <img src="../brand/primevolt-mark.png" width="28">
  </div>
</div>
</body></html>
