<!doctype html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
 *{margin:0;box-sizing:border-box}
 .og{width:1200px;height:630px;background:linear-gradient(135deg,#15406B 0%,#0D2C4D 55%,#07182C 100%);position:relative;overflow:hidden;font-family:'Inter',sans-serif;padding:72px 80px;display:flex;flex-direction:column;justify-content:space-between}
 .glow{position:absolute;width:680px;height:680px;border-radius:50%;background:radial-gradient(circle,rgba(31,168,92,.45),transparent 62%);filter:blur(30px);top:-220px;right:-160px}
 svg.bg{position:absolute;inset:0;opacity:.5}
 .brand{display:flex;align-items:center;gap:22px;position:relative;z-index:2}
 .brand .wm{font-family:'Sora';font-weight:800;font-size:42px;color:#fff;letter-spacing:-1px}
 .brand .wm .v{color:#2ED47A}
 .brand .tag{font-family:'Sora';font-weight:600;font-size:13px;letter-spacing:7px;color:#90a8be;margin-top:4px}
 h1{font-family:'Sora';font-weight:800;font-size:62px;line-height:1.08;color:#fff;letter-spacing:-1.5px;position:relative;z-index:2;max-width:920px}
 h1 .g{background:linear-gradient(120deg,#A7E9C6,#34D17E 55%,#1FA85C);-webkit-background-clip:text;background-clip:text;color:transparent}
 .row{display:flex;align-items:center;gap:28px;position:relative;z-index:2}
 .pill{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:10px 20px;color:#cfe0f0;font-size:17px;font-weight:500}
 .pill b{color:#3a2606;background:linear-gradient(135deg,#FFD774,#F59E0B);font-family:'Sora';font-weight:700;font-size:14px;padding:3px 12px;border-radius:999px}
 .web{margin-left:auto;color:#8fb0ce;font-family:'Sora';font-weight:600;font-size:19px}
</style></head>
<body>
<div class="og" id="og">
  <div class="glow"></div>
  <svg class="bg" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
    <g stroke="#34D17E" stroke-opacity=".12" stroke-width="1.4"><line x1="0" y1="140" x2="1200" y2="60"/><line x1="0" y1="360" x2="1200" y2="240"/><line x1="0" y1="540" x2="1200" y2="420"/></g>
    <g fill="#F59E0B" fill-opacity=".55"><circle cx="980" cy="120" r="4"/><circle cx="1080" cy="300" r="4"/><circle cx="900" cy="430" r="3.4"/></g>
  </svg>
  <div class="brand">
    <svg width="96" height="96" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ogA" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#E0382F"/><stop offset="1" stop-color="#F58233"/></linearGradient>
        <linearGradient id="ogB" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFD23F"/><stop offset="1" stop-color="#F5A100"/></linearGradient>
      </defs>
      <path d="M18 100 A42 42 0 0 1 102 100 Z" fill="url(#ogA)"/>
      <g stroke="#E0382F" stroke-width="2.4" stroke-linecap="round" opacity=".8"><line x1="60" y1="40" x2="60" y2="30"/><line x1="34" y1="52" x2="27" y2="46"/><line x1="86" y1="52" x2="93" y2="46"/></g>
      <line x1="12" y1="100" x2="108" y2="100" stroke="#9FC2E0" stroke-width="2.6" stroke-linecap="round"/>
      <g stroke="#CFE6FF" stroke-width="2.5" stroke-linecap="round" fill="none"><path d="M40 100 L55 38"/><path d="M80 100 L65 38"/><path d="M55 38 L60 24 L65 38"/><path d="M60 38 L60 24"/><path d="M31 70 H89"/><path d="M37 56 H83"/><path d="M43 44 H77"/><path d="M45 96 L74 80 M75 96 L46 80 M48 78 L72 66 M73 78 L49 66 M51 64 L69 54 M70 64 L52 54"/></g>
      <path d="M67 30 L49 66 H60 L54 98 L77 58 H64 L73 30 Z" fill="url(#ogB)" stroke="#fff" stroke-width="1.4" stroke-linejoin="round"/>
    </svg>
    <div><div class="wm">PRIME<span class="v">VOLT</span></div><div class="tag">ENERGY&nbsp;SYSTEMS</div></div>
  </div>
  <h1>Engineering a <span class="g">Smarter, Stronger</span><br>Power Grid for Ontario</h1>
  <div class="row">
    <span class="pill"><b>EST. 2026</b> High-Voltage Transmission &amp; Grid Modernization</span>
    <span class="web">www.primevoltes.ca</span>
  </div>
</div>
</body></html>
