<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  body{margin:0;font-family:'Inter',sans-serif;background:#eef2f7}
  .row{display:flex;gap:0;flex-wrap:wrap}
  .cell{padding:46px 54px;display:flex;flex-direction:column;align-items:center;gap:18px}
  .light{background:#F4F7FB}
  .dark{background:#0A1F33}
  .label{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#8aa0b6;font-weight:600}
  .dark .label{color:#5b7791}
  /* wordmark */
  .wm{font-family:'Sora',sans-serif;font-weight:800;font-size:46px;letter-spacing:-1px;line-height:1}
  .wm .p{color:#0C2747}.wm .v{color:#2E7DF6}
  .dark .wm .p{color:#F4F7FB}
  .tag{font-family:'Sora',sans-serif;font-weight:600;font-size:13px;letter-spacing:7px;color:#5B7185;margin-top:7px}
  .dark .tag{color:#7C93A8}
  .lockup{display:flex;align-items:center;gap:20px}
  .wmwrap{display:flex;flex-direction:column}
</style>
</head>
<body>

<!-- ============ EMBLEM CONCEPTS, light + dark ============ -->
<div class="row" id="emblems">

  <!-- A: VOLT TILE -->
  <div class="cell light">
    <div class="label">A · Volt Tile</div>
    <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="aNavy" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#15406B"/><stop offset=".55" stop-color="#0D2C4D"/><stop offset="1" stop-color="#081B30"/>
        </linearGradient>
        <linearGradient id="aBolt" x1=".15" y1="0" x2=".85" y2="1">
          <stop offset="0" stop-color="#9FE0FF"/><stop offset=".5" stop-color="#46B4F5"/><stop offset="1" stop-color="#2563EB"/>
        </linearGradient>
        <linearGradient id="aGold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFD774"/><stop offset="1" stop-color="#F59E0B"/></linearGradient>
      </defs>
      <rect x="6" y="6" width="108" height="108" rx="28" fill="url(#aNavy)"/>
      <rect x="6.8" y="6.8" width="106.4" height="106.4" rx="27.2" fill="none" stroke="#3E7AB8" stroke-opacity=".45" stroke-width="1.4"/>
      <g stroke="#4E83BF" stroke-opacity=".4" stroke-width="2">
        <line x1="22" y1="44" x2="98" y2="37"/><line x1="22" y1="86" x2="98" y2="79"/>
      </g>
      <g fill="#6CA5DA" fill-opacity=".55">
        <circle cx="34" cy="42.7" r="2.3"/><circle cx="60" cy="40.4" r="2.3"/><circle cx="86" cy="38.1" r="2.3"/>
        <circle cx="34" cy="84.7" r="2.3"/><circle cx="60" cy="82.4" r="2.3"/><circle cx="86" cy="80.1" r="2.3"/>
      </g>
      <path d="M68 22 L38 66 H55 L49 100 L84 54 H66 L75 22 Z" fill="url(#aBolt)"/>
      <circle cx="59.5" cy="61" r="4.3" fill="url(#aGold)"/>
    </svg>
  </div>
  <div class="cell dark">
    <div class="label">A · on navy</div>
    <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="aNavy2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#15406B"/><stop offset=".55" stop-color="#0D2C4D"/><stop offset="1" stop-color="#081B30"/></linearGradient>
        <linearGradient id="aBolt2" x1=".15" y1="0" x2=".85" y2="1"><stop offset="0" stop-color="#9FE0FF"/><stop offset=".5" stop-color="#46B4F5"/><stop offset="1" stop-color="#2563EB"/></linearGradient>
        <linearGradient id="aGold2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFD774"/><stop offset="1" stop-color="#F59E0B"/></linearGradient>
      </defs>
      <rect x="6" y="6" width="108" height="108" rx="28" fill="url(#aNavy2)" stroke="#2E5C8A" stroke-opacity=".5"/>
      <g stroke="#4E83BF" stroke-opacity=".4" stroke-width="2"><line x1="22" y1="44" x2="98" y2="37"/><line x1="22" y1="86" x2="98" y2="79"/></g>
      <g fill="#6CA5DA" fill-opacity=".55"><circle cx="34" cy="42.7" r="2.3"/><circle cx="60" cy="40.4" r="2.3"/><circle cx="86" cy="38.1" r="2.3"/><circle cx="34" cy="84.7" r="2.3"/><circle cx="60" cy="82.4" r="2.3"/><circle cx="86" cy="80.1" r="2.3"/></g>
      <path d="M68 22 L38 66 H55 L49 100 L84 54 H66 L75 22 Z" fill="url(#aBolt2)"/>
      <circle cx="59.5" cy="61" r="4.3" fill="url(#aGold2)"/>
    </svg>
  </div>

  <!-- B: GRID HEX -->
  <div class="cell light">
    <div class="label">B · Grid Hex</div>
    <svg width="124" height="124" viewBox="0 0 124 124" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bNavy" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#16436F"/><stop offset=".6" stop-color="#0C2A4A"/><stop offset="1" stop-color="#07182C"/></linearGradient>
        <linearGradient id="bBolt" x1=".1" y1="0" x2=".9" y2="1"><stop offset="0" stop-color="#A5E3FF"/><stop offset=".5" stop-color="#3FB0F4"/><stop offset="1" stop-color="#2160E6"/></linearGradient>
        <linearGradient id="bGold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFD774"/><stop offset="1" stop-color="#F59E0B"/></linearGradient>
      </defs>
      <path d="M62 8 L108 34 V86 L62 112 L16 86 V34 Z" fill="url(#bNavy)" stroke="#3E7AB8" stroke-opacity=".45" stroke-width="1.6"/>
      <g fill="#FFD774" fill-opacity=".9"><circle cx="62" cy="8" r="3"/><circle cx="108" cy="34" r="3"/><circle cx="108" cy="86" r="3"/><circle cx="62" cy="112" r="3"/><circle cx="16" cy="86" r="3"/><circle cx="16" cy="34" r="3"/></g>
      <path d="M70 24 L40 68 H57 L51 102 L86 56 H68 L77 24 Z" fill="url(#bBolt)"/>
      <circle cx="61.5" cy="63" r="4" fill="url(#bGold)"/>
    </svg>
  </div>
  <div class="cell dark">
    <div class="label">B · on navy</div>
    <svg width="124" height="124" viewBox="0 0 124 124" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bNavy2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#16436F"/><stop offset=".6" stop-color="#0C2A4A"/><stop offset="1" stop-color="#07182C"/></linearGradient>
        <linearGradient id="bBolt2" x1=".1" y1="0" x2=".9" y2="1"><stop offset="0" stop-color="#A5E3FF"/><stop offset=".5" stop-color="#3FB0F4"/><stop offset="1" stop-color="#2160E6"/></linearGradient>
        <linearGradient id="bGold2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFD774"/><stop offset="1" stop-color="#F59E0B"/></linearGradient>
      </defs>
      <path d="M62 8 L108 34 V86 L62 112 L16 86 V34 Z" fill="url(#bNavy2)" stroke="#2E5C8A" stroke-opacity=".6" stroke-width="1.6"/>
      <g fill="#FFD774" fill-opacity=".9"><circle cx="62" cy="8" r="3"/><circle cx="108" cy="34" r="3"/><circle cx="108" cy="86" r="3"/><circle cx="62" cy="112" r="3"/><circle cx="16" cy="86" r="3"/><circle cx="16" cy="34" r="3"/></g>
      <path d="M70 24 L40 68 H57 L51 102 L86 56 H68 L77 24 Z" fill="url(#bBolt2)"/>
      <circle cx="61.5" cy="63" r="4" fill="url(#bGold2)"/>
    </svg>
  </div>

  <!-- C: PYLON / OPEN MARK -->
  <div class="cell light">
    <div class="label">C · Pylon Bolt</div>
    <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="cBolt" x1=".1" y1="0" x2=".9" y2="1"><stop offset="0" stop-color="#46B4F5"/><stop offset="1" stop-color="#1E54CC"/></linearGradient>
        <linearGradient id="cRing" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2E7DF6"/><stop offset="1" stop-color="#0C2747"/></linearGradient>
      </defs>
      <circle cx="60" cy="60" r="52" fill="none" stroke="url(#cRing)" stroke-width="5"/>
      <path d="M64 24 L36 68 H54 L48 96" fill="none" stroke="#0C2747" stroke-width="0"/>
      <path d="M68 22 L38 66 H55 L49 100 L84 54 H66 L75 22 Z" fill="url(#cBolt)"/>
      <circle cx="60" cy="60" r="4.3" fill="#F59E0B"/>
      <g stroke="#F59E0B" stroke-width="2.4" stroke-linecap="round"><line x1="14" y1="60" x2="24" y2="60"/><line x1="96" y1="60" x2="106" y2="60"/></g>
    </svg>
  </div>
  <div class="cell dark">
    <div class="label">C · on navy</div>
    <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="cBolt2" x1=".1" y1="0" x2=".9" y2="1"><stop offset="0" stop-color="#7DD3FC"/><stop offset="1" stop-color="#2E7DF6"/></linearGradient>
        <linearGradient id="cRing2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#56CCF2"/><stop offset="1" stop-color="#2E7DF6"/></linearGradient>
      </defs>
      <circle cx="60" cy="60" r="52" fill="none" stroke="url(#cRing2)" stroke-width="5" stroke-opacity=".8"/>
      <path d="M68 22 L38 66 H55 L49 100 L84 54 H66 L75 22 Z" fill="url(#cBolt2)"/>
      <circle cx="60" cy="60" r="4.3" fill="#F59E0B"/>
      <g stroke="#F59E0B" stroke-width="2.4" stroke-linecap="round"><line x1="14" y1="60" x2="24" y2="60"/><line x1="96" y1="60" x2="106" y2="60"/></g>
    </svg>
  </div>
</div>

<!-- ============ FULL HORIZONTAL LOCKUPS (using emblem A) ============ -->
<div class="row">
  <div class="cell light" style="align-items:flex-start;width:100%">
    <div class="label">Primary horizontal lockup</div>
    <div class="lockup">
      <svg width="96" height="96" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lNavy" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#15406B"/><stop offset=".55" stop-color="#0D2C4D"/><stop offset="1" stop-color="#081B30"/></linearGradient>
          <linearGradient id="lBolt" x1=".15" y1="0" x2=".85" y2="1"><stop offset="0" stop-color="#9FE0FF"/><stop offset=".5" stop-color="#46B4F5"/><stop offset="1" stop-color="#2563EB"/></linearGradient>
          <linearGradient id="lGold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFD774"/><stop offset="1" stop-color="#F59E0B"/></linearGradient>
        </defs>
        <rect x="6" y="6" width="108" height="108" rx="28" fill="url(#lNavy)"/>
        <rect x="6.8" y="6.8" width="106.4" height="106.4" rx="27.2" fill="none" stroke="#3E7AB8" stroke-opacity=".45" stroke-width="1.4"/>
        <g stroke="#4E83BF" stroke-opacity=".4" stroke-width="2"><line x1="22" y1="44" x2="98" y2="37"/><line x1="22" y1="86" x2="98" y2="79"/></g>
        <g fill="#6CA5DA" fill-opacity=".55"><circle cx="34" cy="42.7" r="2.3"/><circle cx="60" cy="40.4" r="2.3"/><circle cx="86" cy="38.1" r="2.3"/><circle cx="34" cy="84.7" r="2.3"/><circle cx="60" cy="82.4" r="2.3"/><circle cx="86" cy="80.1" r="2.3"/></g>
        <path d="M68 22 L38 66 H55 L49 100 L84 54 H66 L75 22 Z" fill="url(#lBolt)"/>
        <circle cx="59.5" cy="61" r="4.3" fill="url(#lGold)"/>
      </svg>
      <div class="wmwrap">
        <div class="wm"><span class="p">PRIME</span><span class="v">VOLT</span></div>
        <div class="tag">ENERGY&nbsp;&nbsp;SYSTEMS</div>
      </div>
    </div>
  </div>
  <div class="cell dark" style="align-items:flex-start;width:100%">
    <div class="label">Reversed (dark)</div>
    <div class="lockup">
      <svg width="96" height="96" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lNavyd" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1A4C7C"/><stop offset=".55" stop-color="#0D2C4D"/><stop offset="1" stop-color="#081B30"/></linearGradient>
          <linearGradient id="lBoltd" x1=".15" y1="0" x2=".85" y2="1"><stop offset="0" stop-color="#9FE0FF"/><stop offset=".5" stop-color="#46B4F5"/><stop offset="1" stop-color="#2563EB"/></linearGradient>
          <linearGradient id="lGoldd" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFD774"/><stop offset="1" stop-color="#F59E0B"/></linearGradient>
        </defs>
        <rect x="6" y="6" width="108" height="108" rx="28" fill="url(#lNavyd)" stroke="#2E5C8A" stroke-opacity=".5"/>
        <g stroke="#4E83BF" stroke-opacity=".4" stroke-width="2"><line x1="22" y1="44" x2="98" y2="37"/><line x1="22" y1="86" x2="98" y2="79"/></g>
        <g fill="#6CA5DA" fill-opacity=".55"><circle cx="34" cy="42.7" r="2.3"/><circle cx="60" cy="40.4" r="2.3"/><circle cx="86" cy="38.1" r="2.3"/><circle cx="34" cy="84.7" r="2.3"/><circle cx="60" cy="82.4" r="2.3"/><circle cx="86" cy="80.1" r="2.3"/></g>
        <path d="M68 22 L38 66 H55 L49 100 L84 54 H66 L75 22 Z" fill="url(#lBoltd)"/>
        <circle cx="59.5" cy="61" r="4.3" fill="url(#lGoldd)"/>
      </svg>
      <div class="wmwrap">
        <div class="wm"><span class="p">PRIME</span><span class="v">VOLT</span></div>
        <div class="tag">ENERGY&nbsp;&nbsp;SYSTEMS</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
